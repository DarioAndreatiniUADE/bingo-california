<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Bingo Solidario - Club California</title>
    
    <link rel="icon" href="escudo.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- COLORES PREMIUM Y VARIABLES --- */
        :root {
            --rojo-club: #8B1A1A; 
            --rojo-oscuro: #5a0b0b;
            --dorado-club: #D4AF37; 
            --dorado-brillante: #FFE87C;
            --fondo-oscuro: #111111;
            --fondo-claro: #f0f2f5;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: var(--fondo-oscuro);
            overflow: hidden; 
            position: relative; 
        }

        /* --- CONTENEDOR PRINCIPAL CON SCALING (ZOOM 67%) --- */
        #app-container {
            width: calc(100vw / 0.67);
            height: calc(100vh / 0.67);
            transform: scale(0.67);
            transform-origin: top left;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- CAPAS DE FONDO --- */
        .fondo-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top center, #ffffff, var(--fondo-claro), #dcdcdc);
            z-index: -2; 
        }

        .marca-agua {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("fondo.png"); 
            background-repeat: no-repeat;
            background-position: center;
            background-size: 55% auto; 
            opacity: 0.12; 
            z-index: -1; 
        }

        /* --- CABECERA --- */
        header {
            background: linear-gradient(to bottom, var(--fondo-oscuro), #222);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        header img {
            height: 85px; 
            filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.2));
            transition: transform 0.3s ease;
        }

        header img:hover {
            transform: scale(1.05);
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            margin: 0;
            font-size: 5rem; 
            letter-spacing: 6px; 
            background: linear-gradient(to right, var(--dorado-club), var(--dorado-brillante), var(--dorado-club));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.8);
        }

        /* --- MENÚ DE CONFIGURACIÓN --- */
        .config-container {
            position: fixed;
            top: 20px;
            right: 30px;
            z-index: 1000; 
        }

        .config-menu-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--dorado-club);
            border-radius: 50%;
            color: white;
            font-size: 2rem;
            line-height: 1;
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .config-menu-btn:hover {
            background: var(--dorado-club);
            color: var(--fondo-oscuro);
            transform: scale(1.1);
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            overflow: hidden;
            min-width: 200px;
            border: 1px solid #ccc;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 15px 25px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: #333;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: #f0f0f0;
            color: var(--rojo-club);
        }

        /* --- MODALES DE EDICIÓN --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border-top: 5px solid var(--rojo-club);
        }

        .modal h3 {
            margin-top: 0;
            color: var(--rojo-club);
            font-size: 2rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
        }
        
        .modal p {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #555;
        }

        .modal textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            resize: none;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .modal textarea:focus {
            outline: none;
            border-color: var(--rojo-club);
        }

        .modal-btns {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.2s;
        }

        .btn-cancelar { 
            background: #e0e0e0; 
            color: #333;
        }
        .btn-cancelar:hover { background: #ccc; }
        
        .btn-guardar { 
            background: var(--rojo-club); 
            color: white; 
            box-shadow: 0 4px 6px rgba(139, 26, 26, 0.4);
        }
        .btn-guardar:hover { background: var(--rojo-oscuro); transform: translateY(-2px); }

        /* --- CINTAS CORREDIZAS --- */
        .seccion-sponsors {
            background: rgba(255, 255, 255, 0.85); 
            border-bottom: 3px solid var(--dorado-club);
            padding: 10px 0 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 5;
            backdrop-filter: blur(5px);
            overflow: hidden;
            width: 100%;
        }

        .titulo-sponsors {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--rojo-oscuro);
            text-transform: uppercase;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .cinta-premios {
            background: linear-gradient(to right, var(--rojo-oscuro), var(--rojo-club), var(--rojo-oscuro));
            border-top: 3px solid var(--dorado-club); 
            padding: 20px 0; 
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2);
            position: relative; 
            z-index: 10; 
            overflow: hidden;
            width: 100%;
        }

        .marquee-track {
            display: flex;
            width: max-content;
        }

        .marquee-items {
            display: flex;
            gap: 40px;
            padding-right: 40px; 
            align-items: center;
        }

        .cinta-sponsors:hover .marquee-track,
        .cinta-premios:hover .marquee-track {
            animation-play-state: paused !important;
        }

        /* La animación 100% precisa */
        @keyframes scroll-infinito {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }

        /* --- ESTILOS DE LOS ITEMS --- */
        .sponsor-item {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            color: var(--fondo-oscuro);
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            white-space: nowrap;
        }

        .premio-item {
            background: rgba(0,0,0,0.2);
            color: white;
            padding: 12px 35px; 
            border-radius: 50px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem; 
            letter-spacing: 2px;
            border: 2px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .premio-item:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--dorado-brillante);
            transform: translateY(-2px);
        }

        /* --- CONTENEDOR PRINCIPAL BINGO --- */
        .contenedor-principal {
            display: flex;
            flex: 1; 
            padding: 20px;
            gap: 40px;
            align-items: center; 
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            position: relative; 
        }

        /* --- PANEL DE CONTROL --- */
        .panel-control {
            flex: 1;
            max-width: 380px;
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(230,230,230,0.95));
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1), -5px -5px 20px rgba(255,255,255,0.8);
            border: 2px solid var(--dorado-club);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative; 
            backdrop-filter: blur(5px); 
        }

        .numero-anterior {
            font-size: 1.1rem;
            color: #666;
            font-weight: 600;
            margin-bottom: 10px;
            background: #f8f9fa;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }

        .numero-anterior span {
            color: var(--rojo-club);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            vertical-align: middle;
        }

        .titulo-panel {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: var(--rojo-club);
            margin: 15px 0 5px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .display-numero {
            background: radial-gradient(circle, #222, #000);
            color: var(--dorado-brillante);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 8rem;
            line-height: 1;
            padding: 20px 30px;
            border-radius: 15px;
            margin: 10px 0 30px 0;
            min-width: 160px;
            border: 4px solid #333;
            box-shadow: 
                inset 0 0 30px rgba(212, 175, 55, 0.1), 
                0 10px 20px rgba(0,0,0,0.4),
                0 0 0 2px var(--dorado-club);
            position: relative;
        }

        .sorteando {
            color: #fff;
            text-shadow: 0 0 20px #fff, 0 0 40px var(--dorado-brillante);
            animation: vibrar 0.1s infinite;
        }

        .ganador-animacion {
            animation: palpito 0.5s ease-out;
            color: var(--dorado-brillante);
            text-shadow: 0 0 30px var(--dorado-brillante);
        }

        @keyframes palpito {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes vibrar {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        .botones-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn-generar, .btn-reiniciar {
            font-family: 'Montserrat', sans-serif;
            color: white;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
            border: none;
            letter-spacing: 1px;
        }

        .btn-generar {
            background: linear-gradient(135deg, var(--rojo-club), var(--rojo-oscuro));
            box-shadow: 0 6px 15px rgba(139, 26, 26, 0.4), inset 0 2px 0 rgba(255,255,255,0.2);
            border: 2px solid var(--rojo-oscuro);
        }

        .btn-generar:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(139, 26, 26, 0.6), inset 0 2px 0 rgba(255,255,255,0.2);
            background: linear-gradient(135deg, #a52020, var(--rojo-club));
        }

        .btn-generar:disabled {
            background: #888;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reiniciar {
            background: linear-gradient(135deg, #555, #333);
            font-size: 0.9rem;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-reiniciar:hover {
            background: linear-gradient(135deg, #444, #222);
            transform: translateY(-2px);
        }

        .contador {
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- CUADRÍCULA DE NÚMEROS --- */
        .contenedor-cuadricula {
            flex: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative; 
        }

        .cuadricula {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: linear-gradient(135deg, rgba(139, 26, 26, 0.9), rgba(90, 11, 11, 0.9)); 
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 0 10px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 750px; 
            aspect-ratio: 10 / 9; 
            backdrop-filter: blur(3px); 
        }

        .celda {
            background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(240,240,240,0.95));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--fondo-oscuro);
            border-radius: 6px;
            position: relative;
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .celda.marcada::before, 
        .celda.marcada::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 50%;
            width: 5px;
            height: 70%;
            background-color: var(--rojo-club);
            border-radius: 5px;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .celda.marcada::before { transform: translateX(-50%) rotate(45deg); }
        .celda.marcada::after { transform: translateX(-50%) rotate(-45deg); }

        .celda.marcada {
            color: #bbb; 
            background: rgba(224, 224, 224, 0.9);
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }

        .celda.ultimo {
            background: linear-gradient(135deg, var(--dorado-brillante), var(--dorado-club));
            color: var(--fondo-oscuro);
            box-shadow: 0 0 20px var(--dorado-brillante), inset 0 0 10px rgba(255,255,255,0.5);
            border: 2px solid #fff;
            transform: scale(1.05);
            z-index: 2;
        }

        @keyframes pop-celda {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .animar-marca {
            animation: pop-celda 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>

    <div class="config-container">
        <button class="config-menu-btn" id="btnConfig">⋮</button>
        <div class="dropdown-menu" id="dropdownConfig">
            <div class="dropdown-item" id="btnEditSponsors">Editar Sponsors</div>
            <div class="dropdown-item" id="btnEditPremios">Editar Premios</div>
        </div>
    </div>

    <div class="modal" id="modalSponsors">
        <div class="modal-content">
            <h3>Editar Sponsors</h3>
            <p>Escribe un sponsor por línea:</p>
            <textarea id="textSponsors">Sponsor del Club</textarea>
            <div class="modal-btns">
                <button class="modal-btn btn-cancelar" onclick="cerrarModal('modalSponsors')">Cancelar</button>
                <button class="modal-btn btn-guardar" onclick="guardarSponsors()">Guardar</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modalPremios">
        <div class="modal-content">
            <h3>Editar Premios</h3>
            <p>Escribe un premio por línea:</p>
            <textarea id="textPremios">1° Premio: Pelota
2° Premio: Make Up
3° Premio: Juego de Mesa
4° Premio: Fantasma</textarea>
            <div class="modal-btns">
                <button class="modal-btn btn-cancelar" onclick="cerrarModal('modalPremios')">Cancelar</button>
                <button class="modal-btn btn-guardar" onclick="guardarPremios()">Guardar</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <div class="fondo-base"></div>
        <div class="marca-agua"></div>

        <header>
            <img src="escudo.png" alt="Escudo Club California">
            <h1>GRAN BINGO SOLIDARIO</h1>
            <img src="escudo.png" alt="Escudo Club California">
        </header>

        <div class="seccion-sponsors">
            <p class="titulo-sponsors">Agradecemos a nuestros sponsors:</p>
            <div class="cinta-sponsors">
                <div class="marquee-track" id="trackSponsors">
                    </div>
            </div>
        </div>

        <main class="contenedor-principal">
            <div class="panel-control">
                <div class="numero-anterior">Anterior: <span id="displayAnterior">--</span></div>
                <h2 class="titulo-panel">ÚLTIMO NÚMERO</h2>
                <div class="display-numero" id="displayNumero">--</div>
                <div class="botones-container">
                    <button class="btn-generar" id="btnGenerar">Tirar Bolilla</button>
                    <button class="btn-reiniciar" id="btnReiniciar">🔄 Nueva Partida</button>
                </div>
                <div class="contador" id="contador">Llamados: 0/90</div>
            </div>

            <div class="contenedor-cuadricula">
                <div class="cuadricula" id="cuadricula"></div>
            </div>
        </main>

        <div class="cinta-premios">
            <div class="marquee-track" id="trackPremios">
                </div>
        </div>

    </div> <script>
        // --- LÓGICA DE EDICIÓN DE CINTAS A PRUEBA DE FALLOS ---
        
        let defaultSponsors = ["Sponsor del Club"];
        let defaultPremios = ["1° Premio: ", "2° Premio: ", "3° Premio: ", "4° Premio: "];

        function renderizarCinta(trackId, itemsArray, claseCSS, prefijo = "") {
            const track = document.getElementById(trackId);
            
            // 1. Clonar los items hasta asegurar que siempre haya suficientes para rellenar la pantalla entera.
            // Si hay solo 1, lo multiplicamos muchas veces.
            let itemsSeguros = [...itemsArray];
            while(itemsSeguros.length < 15) {
                itemsSeguros = itemsSeguros.concat(itemsArray);
            }

            // 2. Construir el HTML base
            let itemsHTML = "";
            itemsSeguros.forEach(item => {
                if(item.trim() !== "") {
                    itemsHTML += `<div class="${claseCSS}">${prefijo}${item}</div>`;
                }
            });
            const bloque = `<div class="marquee-items">${itemsHTML}</div>`;

            // 3. Reiniciar animación e inyectar exactamente DOS bloques (50% y 50%)
            track.style.animation = 'none';
            track.innerHTML = bloque + bloque;
            
            // 4. Forzar al navegador a recalcular
            void track.offsetWidth; 
            
            // 5. Ajustar velocidad (unos 3 segundos por item para que sea legible siempre)
            let velocidad = itemsSeguros.length * 5; 
            track.style.animation = `scroll-infinito ${velocidad}s linear infinite`;
        }

        function abrirModal(idModal, textAreaId, arrayDatos) {
            document.getElementById(idModal).classList.add('show');
            document.getElementById(textAreaId).value = arrayDatos.join('\n');
            document.getElementById('dropdownConfig').classList.remove('show');
        }

        function cerrarModal(idModal) {
            document.getElementById(idModal).classList.remove('show');
        }

        function guardarSponsors() {
            const texto = document.getElementById('textSponsors').value;
            defaultSponsors = texto.split('\n').filter(s => s.trim() !== "");
            if(defaultSponsors.length === 0) defaultSponsors = ["Sponsors del Club"]; // Backup por si lo borran todo
            renderizarCinta('trackSponsors', defaultSponsors, 'sponsor-item', '✦ ');
            cerrarModal('modalSponsors');
        }

        function guardarPremios() {
            const texto = document.getElementById('textPremios').value;
            defaultPremios = texto.split('\n').filter(p => p.trim() !== "");
            if(defaultPremios.length === 0) defaultPremios = ["Premios Sorpresa"]; // Backup
            renderizarCinta('trackPremios', defaultPremios, 'premio-item');
            cerrarModal('modalPremios');
        }

        // Eventos del Menú
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('dropdownConfig');
            const btn = document.getElementById('btnConfig');
            if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });

        document.getElementById('btnConfig').addEventListener('click', () => {
            document.getElementById('dropdownConfig').classList.toggle('show');
        });

        document.getElementById('btnEditSponsors').addEventListener('click', () => {
            abrirModal('modalSponsors', 'textSponsors', defaultSponsors);
        });

        document.getElementById('btnEditPremios').addEventListener('click', () => {
            abrirModal('modalPremios', 'textPremios', defaultPremios);
        });

        // Inicializar cintas
        renderizarCinta('trackSponsors', defaultSponsors, 'sponsor-item', '✦ ');
        renderizarCinta('trackPremios', defaultPremios, 'premio-item');


        // --- LÓGICA DEL BINGO ---
        const totalNumeros = 90; 
        let numerosDisponibles = [];
        let cantidadLlamados = 0;
        let numeroAnterior = null;
        let isRolling = false; 

        const contenedorCuadricula = document.getElementById('cuadricula');
        const displayNumero = document.getElementById('displayNumero');
        const displayAnterior = document.getElementById('displayAnterior');
        const btnGenerar = document.getElementById('btnGenerar');
        const btnReiniciar = document.getElementById('btnReiniciar');
        const contador = document.getElementById('contador');

        function formatearNumero(num) {
            return num < 10 ? '0' + num : num;
        }

        function iniciarJuego() {
            numerosDisponibles = Array.from({length: totalNumeros}, (_, i) => i + 1);
            cantidadLlamados = 0;
            numeroAnterior = null;
            
            displayNumero.textContent = '--';
            displayAnterior.textContent = '--';
            displayNumero.classList.remove('ganador-animacion');
            contador.textContent = `Llamados: 0/${totalNumeros}`;
            btnGenerar.disabled = false;
            btnGenerar.textContent = "Tirar Bolilla";

            contenedorCuadricula.innerHTML = '';
            for (let i = 1; i <= totalNumeros; i++) {
                const celda = document.createElement('div');
                celda.classList.add('celda');
                celda.id = 'celda-' + i;
                celda.textContent = i;
                contenedorCuadricula.appendChild(celda);
            }
        }

        btnGenerar.addEventListener('click', () => {
            if (numerosDisponibles.length === 0 || isRolling) return;
            
            isRolling = true;
            btnGenerar.disabled = true;
            
            displayNumero.classList.remove('ganador-animacion');
            displayNumero.classList.add('sorteando'); 

            let intervaloGiro = setInterval(() => {
                let randomTemp = Math.floor(Math.random() * totalNumeros) + 1;
                displayNumero.textContent = formatearNumero(randomTemp);
            }, 50); 

            setTimeout(() => {
                clearInterval(intervaloGiro);
                displayNumero.classList.remove('sorteando');

                const indiceAleatorio = Math.floor(Math.random() * numerosDisponibles.length);
                const numeroSorteado = numerosDisponibles[indiceAleatorio];
                numerosDisponibles.splice(indiceAleatorio, 1); 
                cantidadLlamados++;

                if (numeroAnterior !== null) {
                    displayAnterior.textContent = formatearNumero(numeroAnterior);
                }
                numeroAnterior = numeroSorteado;

                displayNumero.textContent = formatearNumero(numeroSorteado);
                
                void displayNumero.offsetWidth; 
                displayNumero.classList.add('ganador-animacion');

                contador.textContent = `Llamados: ${cantidadLlamados}/${totalNumeros}`;

                document.querySelectorAll('.celda.ultimo').forEach(el => {
                    el.classList.remove('ultimo');
                    el.classList.remove('animar-marca');
                });

                const celdaAMarcar = document.getElementById('celda-' + numeroSorteado);
                celdaAMarcar.classList.add('marcada');
                celdaAMarcar.classList.add('ultimo'); 
                celdaAMarcar.classList.add('animar-marca');

                isRolling = false;

                if (numerosDisponibles.length === 0) {
                    btnGenerar.textContent = "BINGO FINALIZADO";
                } else {
                    btnGenerar.disabled = false;
                }
            }, 4500); 
        });

        btnReiniciar.addEventListener('click', () => {
            if(confirm("¿Estás seguro de que quieres borrar todo y empezar una partida nueva?")) {
                iniciarJuego();
            }
        });

        iniciarJuego();
    </script>
</body>
</html>
